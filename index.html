<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - V1 ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(28px, 6vw, 35px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px 20px; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 25px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 25px; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* আপনার দেওয়া স্ক্রিনশট অনুযায়ী টাইমার স্টাইল */
        #timer-display { font-size: 100px; font-family: 'Orbitron'; color: #00ffcc; font-weight: 900; text-shadow: 0 0 30px rgba(0, 255, 204, 0.5); line-height: 1; }
        
        /* সিগন্যাল লিস্ট স্টাইল */
        .signal-list-container { width: 100%; max-height: 300px; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        .signal-item { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; border-radius: 15px; margin-bottom: 8px; text-align: center; font-weight: bold; font-family: 'Orbitron'; font-size: 14px; }

        #side-menu { display: none; position: fixed; inset: 0; width: 85%; background: #080808; z-index: 30000; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
        #scan-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .scan-line { width: 220px; height: 3px; background: #00ffcc; box-shadow: 0 0 20px #00ffcc; position: absolute; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { transform: translateY(-100px); } 50% { transform: translateY(100px); } }
    </style>
</head>
<body>

    <script>
        const CONFIG = { USERNAME: "Arif09", PASSWORD: "Arif@098" };
        let currentMode = "";
        let selectedMarket = "";
        let signalCount = 5;
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-3xl text-cyan-400 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-4 text-center text-cyan-400 font-bold" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-10 text-center text-cyan-400 font-bold" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black uppercase">Login</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl text-cyan-400 font-bold uppercase">BX MENU</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="space-y-4">
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center" onclick="goHome()"><i class="fas fa-home mr-4"></i> HOME</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center" onclick="modeSelect('FUTURE SIGNAL')"><i class="fas fa-chart-line mr-4 text-cyan-400"></i> Future Signal</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center" onclick="modeSelect('10s COMPOUNDING')"><i class="fas fa-bolt mr-4 text-yellow-400"></i> 10s Compound</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center" onclick="modeSelect('LIVE ANALYZER')"><i class="fas fa-microscope mr-4 text-purple-400"></i> Live Analyzer</div>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h1 id="header-title" style="font-family: 'Orbitron';" class="text-lg font-black text-cyan-400 uppercase text-center flex-grow">BURAK 亗 JINN</h1>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br>BROTHER</h1>
                    <p id="active-market" class="text-[10px] text-gray-700 mt-6 tracking-[5px] uppercase">Server Connected</p>
                    
                    <div id="future-selector" class="hidden mt-6">
                        <p class="text-xs text-gray-500 mb-2">SELECT SIGNAL COUNT</p>
                        <select id="sig-qty" class="bg-black border border-cyan-900 text-cyan-400 px-4 py-2 rounded-lg font-bold" onchange="signalCount = this.value">
                            <option value="5">5 Signals</option>
                            <option value="10">10 Signals</option>
                            <option value="15">15 Signals</option>
                        </select>
                    </div>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-14 bg-[#030303]" onclick="triggerGallery()">
                        <h1 id="upload-status" class="text-sm font-bold text-gray-500 uppercase">Upload Chart Screenshot</h1>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                </div>

                <div id="ui-timer" class="hidden text-center">
                    <div id="timer-display">10</div>
                    <p class="text-cyan-500 tracking-[5px] text-xs mt-4 uppercase">Wait for Analysis</p>
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center w-full">
                    <div id="single-result" class="flex flex-col items-center">
                        <div id="res-icon" class="text-[80px] mb-2"></div>
                        <h1 id="res-txt" class="text-2xl font-black italic uppercase"></h1>
                    </div>
                    
                    <div id="multi-result" class="hidden signal-list-container">
                        </div>

                    <button id="next-btn" onclick="nextAnalysis()" class="hidden action-btn">Next Analysis</button>
                </div>
            </div>
            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">Analyze Market</button>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-lg font-bold text-cyan-400">SELECT ASSET</h2>
            <i class="fas fa-times text-2xl" onclick="closeModal()"></i>
        </div>
        <div class="overflow-y-auto h-[80vh]">
            <script>
                ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "NZD/USD (OTC)"].forEach(m => {
                    document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus text-cyan-500"></i></div>`);
                });
            </script>
        </div>
    </div>

    <div id="scan-overlay">
        <div class="relative w-full h-full flex items-center justify-center">
            <div class="scan-line"></div>
            <p class="text-cyan-400 font-bold tracking-[5px] animate-pulse">EXTRACTING SMC...</p>
        </div>
    </div>

    <script>
        function doLogin() {
            if(document.getElementById('uid').value === CONFIG.USERNAME && document.getElementById('ukey').value === CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            } else alert("Access Denied");
        }

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function goHome() {
            toggleMenu(); resetUI(); currentMode = "";
            document.getElementById('header-title').innerText = "BURAK 亗 JINN";
        }

        function modeSelect(m) {
            currentMode = m; toggleMenu(); resetUI();
            document.getElementById('header-title').innerText = m;
            if(m === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else {
                document.getElementById('market-modal').style.display = 'block';
                if(m === 'FUTURE SIGNAL') document.getElementById('future-selector').classList.remove('hidden');
            }
        }

        function pickMarket(m) {
            selectedMarket = m; closeModal();
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('active-market').innerText = "Asset: " + m;
            document.getElementById('btn-execute').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('market-modal').style.display = 'none'; }
        function triggerGallery() { document.getElementById('inp-file').click(); }
        function fileSelected() { document.getElementById('upload-status').innerText = "Chart Ready"; document.getElementById('btn-execute').classList.remove('hidden'); }

        function startProcess() {
            document.getElementById('scan-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('scan-overlay').style.display = 'none';
                handleModeAction();
            }, 3000);
        }

        function handleModeAction() {
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');

            if(currentMode === '10s COMPOUNDING') {
                run10sTimer();
            } else {
                showFinalResults();
            }
        }

        function run10sTimer() {
            document.getElementById('ui-timer').classList.remove('hidden');
            let time = 10;
            const display = document.getElementById('timer-display');
            const iv = setInterval(() => {
                time--; display.innerText = time;
                if(time <= 0) {
                    clearInterval(iv);
                    document.getElementById('ui-timer').classList.add('hidden');
                    showFinalResults();
                }
            }, 1000);
        }

        function showFinalResults() {
            document.getElementById('ui-result').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            
            const singleBox = document.getElementById('single-result');
            const multiBox = document.getElementById('multi-result');
            
            if(currentMode === 'FUTURE SIGNAL') {
                singleBox.classList.add('hidden');
                multiBox.classList.remove('hidden');
                multiBox.innerHTML = "";
                
                for(let i=0; i < signalCount; i++) {
                    const isCall = Math.random() > 0.5;
                    const time = new Date(Date.now() + (i+1)*5*60000);
                    const timeStr = time.getHours() + ":" + (time.getMinutes()<10?'0':'') + time.getMinutes();
                    multiBox.innerHTML += `
                        <div class="signal-item" style="color: ${isCall ? '#00ffcc' : '#ff3333'}">
                            ${timeStr} - ${selectedMarket} - ${isCall ? 'CALL ↑' : 'PUT ↓'}
                        </div>`;
                }
            } else {
                singleBox.classList.remove('hidden');
                multiBox.classList.add('hidden');
                const isCall = Math.random() > 0.5;
                document.getElementById('res-txt').innerText = isCall ? "CALL ↑" : "PUT ↓";
                document.getElementById('res-txt').style.color = isCall ? "#00ffcc" : "#ff3333";
                document.getElementById('res-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up text-cyan-400"></i>' : '<i class="fas fa-arrow-circle-down text-red-500"></i>';
            }
        }

        function nextAnalysis() {
            resetUI();
            if(currentMode === 'LIVE ANALYZER') {
                document.getElementById('ui-analyzer').classList.remove('hidden');
                document.getElementById('upload-status').innerText = "Upload Chart Screenshot";
            } else {
                document.getElementById('ui-welcome').classList.remove('hidden');
                document.getElementById('btn-execute').classList.remove('hidden');
                if(currentMode === 'FUTURE SIGNAL') document.getElementById('future-selector').classList.remove('hidden');
            }
        }

        function resetUI() {
            const divs = ['ui-welcome', 'ui-analyzer', 'ui-timer', 'ui-result', 'btn-execute', 'future-selector', 'next-btn'];
            divs.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('timer-display').innerText = "10";
            document.getElementById('inp-file').value = "";
        }
    </script>
</body>
</html>
