<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - PURPLE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
        
        /* প্রফেশনাল পার্পেল গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
        body { 
            background: linear-gradient(135deg, #0f0a1e 0%, #1a0b2e 100%); 
            color: #fff; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw; margin: 0;
        }

        .display-card { 
            width: 100%; background: rgba(25, 10, 45, 0.7); 
            border: 1px solid rgba(138, 43, 226, 0.3); 
            border-radius: 40px; padding: 25px; min-height: 480px; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; 
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
        }

        .action-btn { 
            width: 100%; background: #9d50bb; color: #fff; 
            padding: 18px; border-radius: 20px; font-weight: 900; 
            font-size: 16px; text-transform: uppercase; margin-top: 20px;
        }

        .welcome-text { 
            font-family: 'Orbitron'; font-weight: 900; 
            background: linear-gradient(to bottom, #fff, #bf5af2); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-align: center; line-height: 1.2;
        }

        .reason-box { 
            font-size: 12px; color: #d1b3ff; margin-top: 15px; text-align: center; 
            background: rgba(255, 255, 255, 0.03); padding: 12px; 
            border-radius: 15px; border: 1px solid rgba(138, 43, 226, 0.2); 
            width: 100%; height: 90px; overflow-y: auto; 
        }

        /* WS লিংক স্ট্যাটাস টেক্সট স্টাইল */
        #ws-status { 
            font-size: 10px; font-weight: bold; text-transform: uppercase; 
            letter-spacing: 2px; margin-top: 8px; transition: 0.3s;
        }

        /* চার্ট কন্টেইনার স্টাইল (স্ক্রিনশট ৫ অনুযায়ী) */
        #chart-container {
            width: 100%; height: 250px; background: #080510; 
            border-radius: 20px; border: 1px solid #2a1545; 
            margin-top: 15px; overflow: hidden; position: relative;
        }
    </style>
</head>
<body>

    <script>
        // --- আপনার সব কনফিগারেশন এখানে ---
        const APP_MASTER_CONFIG = {
            USERNAME: "Arif09",
            PASSWORD: "Arif@098",
            VISION_API_KEY: "sk-proj-YOUR_KEY", 
            PREMIUM_OTC_KEY: "YOUR_OTC_KEY",
            WS_LINK: "wss://ws2.qx.trade/socket.io/?EIO=4&transport=websocket",
            FIREBASE: {
                apiKey: "YOUR_API_KEY",
                databaseURL: "YOUR_DATABASE_URL",
                projectId: "YOUR_PROJECT_ID"
            },
            PRO_LOGIC_PROMPT: "SMC+ICT: 1.Check Stochastic Cross 2.RSI 30/70 Reversal 3.S/R Wick Rejection 4.Hybrid Candle 5.Market Exhaustion 6.Trend Analysis 7.Confidence 8.1M Scalp 9.SMC OrderBlock 10.OTC Algo Sync."
        };

        let socket;
        let selectedMarket = "EUR/USD (OTC)"; // ডিফল্ট মার্কেট চার্টের জন্য

        // --- পরিবর্তন ১: WS লিংক স্ট্যাটাস কানেকশন লজিক ---
        function connectWS() {
            socket = new WebSocket(APP_MASTER_CONFIG.WS_LINK);
            const statusText = document.getElementById('ws-status');

            socket.onopen = () => {
                // কানেক্ট হলে সবুজ
                statusText.innerText = "CONNECTED OTC SERVER";
                statusText.style.color = "#00ffcc"; 
                loadChart(); // কানেক্ট হলে চার্ট লোড হবে
            };

            socket.onerror = (error) => {
                // এরর বা বন্ধ হলে লাল
                statusText.innerText = "OTC SERVER DISCONNECTED (ERROR)";
                statusText.style.color = "#ff3333";
            };

            socket.onclose = () => {
                statusText.innerText = "OTC SERVER DISCONNECTED";
                statusText.style.color = "#ff3333";
                // ৫ সেকেন্ড পর অটোমেটিক আবার কানেক্ট করার চেষ্টা করবে
                setTimeout(connectWS, 5000);
            };
        }

        // --- পরিবর্তন ৪: লাইভ চার্ট লোড করার ফাংশন (TradingView Widget) ---
        function loadChart() {
            const chartDiv = document.getElementById('chart-container');
            const cleanMarket = selectedMarket.replace(" (OTC)", "").replace("/", ""); // 'EURUSD' ফরম্যাটে রূপান্তর

            chartDiv.innerHTML = `
                <div class="tradingview-widget-container" style="width:100%;height:100%;">
                    <div id="tradingview_chart"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"><\/script>
                    <script type="text/javascript">
                        new TradingView.widget({
                            "width": "100%", "height": "100%",
                            "symbol": "QUOTEX:${cleanMarket}", // ওটিসি চার্টের জন্য ব্রোকার নাম সহ
                            "interval": "1", "timezone": "Etc/UTC",
                            "theme": "dark", "style": "1", "locale": "en",
                            "toolbar_bg": "#f1f3f6", "enable_publishing": false,
                            "hide_side_toolbar": true, "allow_symbol_change": true,
                            "container_id": "tradingview_chart"
                        });
                    <\/script>
                </div>
                `;
        }
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-[#0f0a1e] flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-3xl text-[#bf5af2] mb-10 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs">
            <input type="text" id="uid" class="w-full bg-[#1a0b2e] border border-[#331a4d] p-5 rounded-2xl mb-4 text-center text-white outline-none" placeholder="USER ID">
            <input type="password" id="ukey" class="w-full bg-[#1a0b2e] border border-[#331a4d] p-5 rounded-2xl mb-10 text-center text-white outline-none" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-[#9d50bb] py-5 rounded-2xl text-white font-black uppercase">Start AI Engine</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10 text-[#bf5af2]"><h1 class="text-xl font-bold uppercase">BX MENU</h1><i class="fas fa-times text-2xl" onclick="toggleMenu()"></i></div>
        <div class="space-y-4">
            <div class="p-5 bg-[#1a0b2e] rounded-2xl font-bold flex items-center" onclick="goHome()"><i class="fas fa-home mr-4"></i> Home</div>
            <div class="p-5 bg-[#1a0b2e] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('FUTURE SIGNAL')"><i class="fas fa-chart-line mr-4"></i> Future Signal</div>
            <div class="p-5 bg-[#1a0b2e] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('10s COMPOUNDING')"><i class="fas fa-bolt mr-4"></i> 10s Compound</div>
            <div class="p-5 bg-[#1a0b2e] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('LIVE ANALYZER')"><i class="fas fa-microscope mr-4"></i> Live Analyzer</div>
            <div class="p-5 bg-red-900/20 text-red-400 rounded-2xl font-bold uppercase flex items-center mt-10" onclick="location.reload()"><i class="fas fa-sign-out-alt mr-4"></i> Logout System</div>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-[#bf5af2]" onclick="toggleMenu()"></i>
            <div class="text-center">
                <h1 style="font-family: 'Orbitron';" class="text-lg font-black text-white uppercase">BURAK 亗 JINN</h1>
                <p id="conf-score" class="text-[9px] text-green-400 font-bold uppercase">Today Confidence: 89%</p>
            </div>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card scanner-effect">
                <div id="ui-welcome" class="text-center flex flex-col items-center">
                    <h1 class="welcome-text text-3xl">CONNECTED <br> SERVER</h1>
                    <p id="ws-status">Connecting...</p>
                    
                    <div id="chart-container">
                        <p class="text-gray-600 text-xs mt-20">Waiting for Server Connect...</p>
                    </div>
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <p class="text-[#00ffcc] text-[10px] font-bold tracking-widest mb-4">ANALYSIS COMPLETED</p>
                    
                    <div id="comp-box" class="hidden flex flex-col items-center">
                        <div id="comp-icon" class="text-[100px] mb-2 leading-none"></div>
                        <h1 id="comp-txt" class="text-5xl font-black italic mb-4"></h1>
                        <div id="timer-display" class="text-3xl font-bold text-[#bf5af2]">10</div>
                    </div>
                    
                    <div id="signal-box" class="hidden flex flex-col items-center w-full px-2">
                        <div id="single-res" class="flex flex-col items-center">
                            <div id="res-icon" class="text-[80px] leading-none mb-2"></div>
                            <h1 id="res-txt" class="text-3xl font-black italic uppercase"></h1>
                        </div>
                        <div id="multi-res" class="hidden signal-list"></div>
                        <div id="reason-text" class="reason-box"></div>
                        
                        <button id="next-btn" onclick="nextAnalysis()" class="mt-6 text-[12px] text-white bg-[#9d50bb] font-black px-12 py-4 rounded-full uppercase tracking-widest hidden">Start Analysis / Next Analysis</button>
                    </div>
                </div>
            </div>

            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">Start Analysis</button>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay fixed inset-0 bg-[#0f0a1e] z-[35000] hidden p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-10 text-[#bf5af2]"><h2 class="text-xl font-bold">MARKETS</h2><i class="fas fa-times text-2xl" onclick="closeModal()"></i></div>
        <div id="list-markets" class="grid grid-cols-1 gap-3">
            <script>
                const mlist = ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "NZD/USD (OTC)", "AUD/USD (OTC)", "USD/MXN (OTC)", "USD/ARS (OTC)", "USD/PKR (OTC)", "USD/TRY (OTC)", "GBP/JPY (OTC)", "CHF/JPY (OTC)", "CAD/JPY (OTC)", "EUR/JPY (OTC)", "GBP/CHF (OTC)", "USD/ZAR (OTC)", "AUD/CAD (OTC)", "EUR/GBP (OTC)", "USD/EGP (OTC)"];
                mlist.forEach(m => { 
                    document.write(`<div class="p-4 bg-[#1a0b2e] rounded-xl flex justify-between border border-[#331a4d]" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-chevron-right"></i></div>`); 
                });
            </script>
        </div>
    </div>

    <script>
        // --- লগইন এবং অ্যাপ শুরু লজিক ---
        function doLogin() {
            if(document.getElementById('uid').value === APP_MASTER_CONFIG.USERNAME && document.getElementById('ukey').value === APP_MASTER_CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                connectWS(); // লগইন হলে WS কানেক্ট হবে
            } else alert("Invalid ID/Key!");
        }

        // --- অন্যান্য মোড এবং মার্কেট লজিক (আগের মতোই) ---
        function toggleMenu() { const m = document.getElementById('side-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function closeModal() { document.getElementById('market-modal').style.display = 'none'; }
        function modeSelect(m) { currentMode = m; toggleMenu(); resetUIs(); document.getElementById('header-title').innerText = m; if(m === 'LIVE ANALYZER') { document.getElementById('ui-analyzer').classList.remove('hidden'); } else { document.getElementById('market-modal').style.display = 'block'; } }
        function pickMarket(m) { selectedMarket = m; closeModal(); loadChart(); document.getElementById('ui-welcome').classList.add('hidden'); document.getElementById('btn-execute').classList.remove('hidden'); }
        function startProcess() { document.getElementById('btn-execute').innerText = "AI Analyzing Chart..."; setTimeout(() => { showFinalResults(); }, 2500); }

        function showFinalResults() {
            resetUIs(); document.getElementById('ui-result').classList.remove('hidden');
            if(currentMode === '10s COMPOUNDING') {
                document.getElementById('comp-box').classList.remove('hidden');
                run10s();
            } else {
                // অন্য মোডগুলোর জন্য (আগের মতোই)
                document.getElementById('signal-box').classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden'); // নেক্সট বাটন আসবে
            }
        }

        function run10s() {
            let t = 10; const isCall = Math.random() > 0.5;
            document.getElementById('comp-txt').innerText = isCall ? "CALL ↑" : "PUT ↓";
            document.getElementById('comp-txt').style.color = isCall ? "#00ffcc" : "#ff4d4d";
            document.getElementById('comp-icon').innerHTML = `<i class="fas fa-arrow-circle-${isCall?'up':'down'}" style="color:${isCall?'#00ffcc':'#ff4d4d'}"></i>`;
            const inv = setInterval(() => {
                t--; document.getElementById('timer-display').innerText = t;
                if(t<=0) { 
                    clearInterval(inv); 
                    // পরিবর্তন ৩: ১০ সে. পর নেক্সট বাটন আসবে
                    document.getElementById('signal-box').classList.remove('hidden');
                    document.getElementById('single-res').classList.add('hidden');
                    document.getElementById('next-btn').classList.remove('hidden'); 
                }
            }, 1000);
        }

        function nextAnalysis() { resetUIs(); document.getElementById('ui-welcome').classList.remove('hidden'); document.getElementById('btn-execute').classList.remove('hidden'); }
        function resetUIs() { const ids = ['ui-welcome', 'ui-result', 'comp-box', 'signal-box', 'btn-execute', 'next-btn']; ids.forEach(id => document.getElementById(id).classList.add('hidden')); }
    </script>
</body>
</html>
