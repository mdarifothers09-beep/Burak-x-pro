<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - V1 ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(30px, 7vw, 40px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px 20px; min-height: 450px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 50px rgba(0,255,204,0.05); }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 25px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; transition: 0.3s; }
        .market-row:active { background: #111; border-color: #00ffcc; }
        #scan-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .radar-circle { width: 200px; height: 200px; border: 2px solid #004433; border-radius: 50%; position: relative; overflow: hidden; }
        .radar-circle::after { content: ''; position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, transparent, #00ffcc); transform-origin: bottom right; animation: rotate 1.5s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .reason-box { font-size: 13px; color: #00ffcc; margin-top: 15px; text-align: center; font-style: italic; background: rgba(0, 255, 204, 0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(0, 255, 204, 0.1); width: 100%; }
        #side-menu { display: none; position: fixed; inset: 0; width: 80%; background: #080808; z-index: 10001; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 20px; border-bottom: 1px solid #111; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            USERNAME: "Arif09",    // এখানে আপনার নতুন ইউজার নেম লিখুন
            PASSWORD: "Arif@098", // এখানে আপনার নতুন পাসওয়ার্ড লিখুন
            API_KEY: "YOUR_PREMIUM_API_KEY_HERE" // এখানে আপনার কেনা এপিআই কি বসাবেন
        };
    </script>

    <div id="login-page" class="fixed inset-0 z-[20001] bg-black flex flex-col items-center justify-center p-10 text-center">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X</h1>
        <p class="text-[10px] text-gray-500 tracking-[5px] uppercase mb-10">Enterprise Access</p>
        <div class="w-full max-w-xs">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-5 text-center text-cyan-400 font-bold outline-none focus:border-cyan-500" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-12 text-center text-cyan-400 font-bold outline-none focus:border-cyan-500" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black text-lg uppercase tracking-widest active:scale-95 transition-transform">Unlock System</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-12">
            <h1 style="font-family: 'Orbitron';" class="text-xl text-cyan-400 font-bold">PRO DASHBOARD</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="menu-item" onclick="modeSelect('FUTURE SIGNAL')"><i class="fas fa-history text-cyan-400"></i> Future Signal</div>
        <div class="menu-item" onclick="modeSelect('10s COMPOUNDING')"><i class="fas fa-bolt text-yellow-400"></i> 10s Compound</div>
        <div class="menu-item" onclick="modeSelect('LIVE ANALYZER')"><i class="fas fa-microchip text-purple-400"></i> Live Analyzer</div>
        <div class="menu-item text-red-500 mt-20" onclick="location.reload()">Logout</div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-bold text-cyan-400 uppercase">ASSET SELECTOR</h2><i class="fas fa-times text-3xl text-gray-600" onclick="closeModal('market-modal')"></i></div>
        <div id="future-opt" class="hidden mb-6 bg-[#0a0a0a] p-5 rounded-2xl border border-[#222]">
            <p class="text-[10px] text-gray-500 mb-3 uppercase font-black">Signal Quantity</p>
            <select id="sig-qty" class="w-full bg-black border border-cyan-900/50 p-4 rounded-xl text-cyan-400 font-black outline-none">
                <option value="5">📊 05 SIGNALS</option>
                <option value="10">📊 10 SIGNALS</option>
                <option value="15">📊 15 SIGNALS</option>
            </select>
        </div>
        <div id="list-markets">
            <script>
                const mlist = ["NZD/CHF (OTC)", "USD/MXN (OTC)", "USD/ARS (OTC)", "NZD/USD (OTC)", "USD/DZD (OTC)", "USD/INR (OTC)", "USD/EGP (OTC)", "USD/BRL (OTC)", "AUD/NZD (OTC)", "CAD/CHF (OTC)", "USD/PKR (OTC)", "USD/IDR (OTC)", "USD/BDT (OTC)", "NZD/CAD (OTC)", "USD/PHP (OTC)", "USD/NGN (OTC)", "USD/COP (OTC)", "USD/ZAR (OTC)", "GBP/NZD (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus-circle text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-4">
            <i class="fas fa-th-large text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h2 class="text-xl font-black italic tracking-tighter">BURAK X <span class="text-cyan-500">V1 PRO</span></h2>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br>BROTHER</h1>
                    <p class="text-[10px] text-gray-700 mt-6 tracking-[8px] uppercase font-bold">Encrypted Connection</p>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div id="upload-box" class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-12 bg-[#030303]" onclick="triggerGallery()">
                        <i class="fas fa-cloud-upload-alt text-4xl text-cyan-400 mb-4 opacity-30"></i>
                        <h1 id="upload-status" class="text-lg font-black text-gray-600 uppercase">Select Chart</h1>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                    <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">Execute Analysis</button>
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <p class="text-[10px] text-cyan-500 font-bold uppercase tracking-[4px] mb-2">Result Algorithm</p>
                    <div id="res-icon" class="text-[130px] leading-none mb-4"></div>
                    <h1 id="res-txt" class="text-5xl font-black italic uppercase"></h1>
                    <div id="conf-display" class="text-orange-500 font-bold mt-2 font-mono tracking-widest uppercase text-xs"></div>
                    <div id="reason-text" class="reason-box"></div>
                    <button onclick="resetApp()" class="mt-8 text-[10px] text-gray-600 uppercase tracking-[4px] border border-gray-900 px-8 py-2 rounded-full">Clear Data</button>
                </div>
            </div>
            <button id="btn-main" onclick="startProcess()" class="hidden action-btn">Run Engine</button>
        </div>
    </div>

    <div id="scan-overlay"><div class="radar-circle mb-12"></div><p class="text-cyan-400 font-bold tracking-[8px] animate-pulse uppercase">Syncing Premium API...</p></div>

    <script>
        let mode = ""; let market = "";

        function doLogin() {
            if(document.getElementById('uid').value === CONFIG.USERNAME && document.getElementById('ukey').value === CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            } else alert("ACCESS DENIED!");
        }

        function toggleMenu() {
            const sm = document.getElementById('side-menu');
            sm.style.display = (sm.style.display === 'block') ? 'none' : 'block';
        }

        function modeSelect(m) {
            mode = m; toggleMenu(); resetApp();
            if(mode === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else {
                document.getElementById('future-opt').className = (mode === 'FUTURE SIGNAL') ? 'block' : 'hidden';
                document.getElementById('market-modal').style.display = 'block';
            }
        }

        function pickMarket(n) {
            market = n; closeModal('market-modal');
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('btn-main').classList.remove('hidden');
        }

        function triggerGallery() { document.getElementById('inp-file').click(); }

        function fileSelected() {
            if(document.getElementById('inp-file').files[0]) {
                document.getElementById('upload-status').innerText = "DATA LOADED";
                document.getElementById('upload-status').style.color = "#00ffcc";
                document.getElementById('btn-execute').classList.remove('hidden');
            }
        }

        function startProcess() {
            if(CONFIG.API_KEY === "YOUR_PREMIUM_API_KEY_HERE") {
                alert("CRITICAL ERROR: Premium API Key is missing. Please insert API Key in the code to connect with OTC Servers.");
                return;
            }
            runScan(5000, showFinal);
        }

        function runScan(t, cb) {
            document.getElementById('scan-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('scan-overlay').style.display = 'none'; cb(); }, t);
        }

        // --- THE BRAIN CORE (SMC + ICT + PRICE ACTION) ---
        function runAILogic() {
            const brain = [
                "SMC: Liquidity Sweep at PDH (Previous Day High). Order flow is Bearish.",
                "ICT: MSS (Market Structure Shift) detected on 1M. FVG filling fast.",
                "VSA: No Demand Bar detected at Resistance. High probability Reversal.",
                "Stoch/RSI: Overbought Zone (85) + Bearish Divergence on OTC Algo.",
                "Pattern: Engulfing Candle at 0.618 Fib Level. Smart Money Entry.",
                "OTC Specialized: Artificial Spike detected. Reversion to Mean expected.",
                "Psychology: Retail traders trapped at Support. Look for Liquidity Grab.",
                "Volume spread: Exhaustion volume detected at 0.46800 level.",
                "ICT: Judas Swing detected during London Session open. Fake-out complete."
            ];
            return brain[Math.floor(Math.random() * brain.length)];
        }

        function showFinal() {
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('btn-main').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('ui-result').classList.remove('hidden');
            
            const call = Math.random() > 0.5;
            const resTxt = document.getElementById('res-txt');
            const resIcon = document.getElementById('res-icon');
            const conf = document.getElementById('conf-display');
            
            resTxt.innerText = call ? "CALL ↑" : "PUT ↓";
            resTxt.style.color = call ? "#00ffcc" : "#ff3333";
            resIcon.innerHTML = call ? '<i class="fas fa-arrow-alt-circle-up" style="color:#00ffcc"></i>' : '<i class="fas fa-arrow-alt-circle-down" style="color:#ff3333"></i>';
            
            conf.innerText = `CONFIDENCE SCORE: ${Math.floor(Math.random() * (99 - 91 + 1)) + 91}%`;
            document.getElementById('reason-text').innerText = "Analysis: " + runAILogic();
        }

        function resetApp() {
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('btn-main').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('upload-status').innerText = "Select Chart";
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
