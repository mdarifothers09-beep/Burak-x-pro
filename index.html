<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - V1 ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(30px, 7vw, 40px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px 20px; min-height: 450px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 50px rgba(0,255,204,0.05); }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 25px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; transition: 0.3s; }
        #scan-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .radar-circle { width: 180px; height: 180px; border: 2px solid #004433; border-radius: 50%; position: relative; overflow: hidden; }
        .radar-circle::after { content: ''; position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, transparent, #00ffcc); transform-origin: bottom right; animation: rotate 1.5s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .reason-box { font-size: 12px; color: #00ffcc; margin-top: 15px; text-align: center; background: rgba(0, 255, 204, 0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(0, 255, 204, 0.1); width: 100%; height: 85px; overflow-y: auto; }
        #side-menu { display: none; position: fixed; inset: 0; width: 85%; background: #080808; z-index: 30000; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
    </style>
</head>
<body>

    <script>
        // --- এক জায়গায় সব সেটিংস (এখান থেকে পরিবর্তন করবেন) ---
        const CONFIG = {
            USERNAME: "Arif09",
            PASSWORD: "Arif@098",
            GPT_VISION_KEY: "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", 
            PREMIUM_OTC_KEY: "YOUR_PREMIUM_OTC_KEY",
            WS_LINK: "wss://ws2.qx.trade/socket.io/?EIO=4&transport=websocket",
            
            // ভিশন এপিআই প্রম্পট (১০টি লজিক সরাসরি এখানে)
            AI_LOGIC_PROMPT: "Analyze this chart using: 1.SMC (Market Structure/Order Blocks) 2.ICT (FVG/Liquidity Sweeps) 3.Price Action (Engulfing/Pinbar) 4.RSI Divergence 5.Stochastic Cross 6.S/R Rejection 7.Trend Confirmation 8.Volume Analysis 9.Exhaustion Candles 10.OTC Mean Reversion. Give Call/Put with confidence %."
        };

        let socket;
        function connectOTC() {
            socket = new WebSocket(CONFIG.WS_LINK);
            socket.onopen = () => { document.getElementById('active-market').innerText = "Synced with OTC Server"; document.getElementById('active-market').style.color = "#00ffcc"; };
            socket.onclose = () => { setTimeout(connectOTC, 5000); };
        }
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X </h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-4 text-center text-cyan-400 font-bold outline-none" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-10 text-center text-cyan-400 font-bold outline-none" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black uppercase tracking-widest">Unlock BX AI</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl text-cyan-400 font-bold uppercase tracking-widest">BX MENU</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="space-y-4">
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center border border-[#111]" onclick="modeSelect('FUTURE SIGNAL')">
                <i class="fas fa-chart-line mr-4 text-cyan-400"></i> Future Signal
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center border border-[#111]" onclick="modeSelect('10s COMPOUNDING')">
                <i class="fas fa-bolt mr-4 text-yellow-400"></i> 10s Compound
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center border border-[#111]" onclick="modeSelect('LIVE ANALYZER')">
                <i class="fas fa-microscope mr-4 text-purple-400"></i> Live Analyzer
            </div>
            <div class="p-5 text-red-500 mt-20 flex items-center" onclick="location.reload()">
                <i class="fas fa-sign-out-alt mr-4"></i> Logout
            </div>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-cyan-400 uppercase">ASSET SELECTOR</h2>
            <i class="fas fa-times text-3xl text-gray-600" onclick="closeModal('market-modal')"></i>
        </div>
        <div id="list-markets">
            <script>
                const mlist = ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "USD/EGP (OTC)", "NZD/USD (OTC)", "AUD/USD (OTC)", "USD/MXN (OTC)", "USD/ARS (OTC)", "USD/PKR (OTC)", "USD/IDR (OTC)", "USD/PHP (OTC)", "USD/NGN (OTC)", "USD/ZAR (OTC)", "GBP/JPY (OTC)", "EUR/GBP (OTC)", "CAD/CHF (OTC)", "NZD/CAD (OTC)", "USD/COP (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus-circle text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h1 style="font-family: 'Orbitron';" class="text-2xl font-black text-cyan-400 uppercase tracking-tighter">BURAK 亗 JINN</h1>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br>BROTHER</h1>
                    <p id="active-market" class="text-[10px] text-gray-700 mt-6 tracking-[8px] uppercase">Connecting Server...</p>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-12 bg-[#030303]" onclick="triggerGallery()">
                        <i class="fas fa-camera text-4xl text-cyan-400 mb-4 opacity-30"></i>
                        <h1 id="upload-status" class="text-lg font-black text-gray-600">UPLOAD CHART</h1>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <div id="res-icon" class="text-[100px] leading-none mb-2"></div>
                    <h1 id="res-txt" class="text-5xl font-black italic uppercase"></h1>
                    <div id="conf-display" class="text-orange-500 font-bold mt-2 text-xs"></div>
                    <div id="reason-text" class="reason-box"></div>
                    <button onclick="resetApp()" class="mt-6 text-[10px] text-gray-600 border border-gray-900 px-6 py-2 rounded-full tracking-widest">RESET ENGINE</button>
                </div>
            </div>
            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">RUN SMC ANALYSIS</button>
        </div>
    </div>

    <div id="scan-overlay"><div class="radar-circle mb-8"></div><p class="text-cyan-400 font-bold tracking-[5px] animate-pulse">SYNCING SMC LOGIC...</p></div>

    <script>
        function doLogin() {
            if(document.getElementById('uid').value === CONFIG.USERNAME && document.getElementById('ukey').value === CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                connectOTC();
            } else alert("INVALID ACCESS");
        }

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function modeSelect(m) {
            toggleMenu(); resetApp();
            if(m === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else {
                document.getElementById('market-modal').style.display = 'block';
            }
        }

        function pickMarket(m) {
            document.getElementById('market-modal').style.display = 'none';
            document.getElementById('active-market').innerText = "MARKET: " + m;
            document.getElementById('btn-execute').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function triggerGallery() { document.getElementById('inp-file').click(); }
        function fileSelected() { if(document.getElementById('inp-file').files[0]) { document.getElementById('upload-status').innerText = "CHART READY"; document.getElementById('btn-execute').classList.remove('hidden'); } }

        async function startProcess() {
            if(CONFIG.GPT_VISION_KEY.includes("YOUR")) { alert("Please set API Key first!"); return; }
            document.getElementById('scan-overlay').style.display = 'flex';
            
            // রিয়েল এপিআই কল করার লজিক এখানে যুক্ত হবে
            setTimeout(() => {
                document.getElementById('scan-overlay').style.display = 'none';
                showFinal();
            }, 4000);
        }

        function showFinal() {
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('ui-result').classList.remove('hidden');
            
            const isCall = Math.random() > 0.5;
            document.getElementById('res-txt').innerText = isCall ? "CALL ↑" : "PUT ↓";
            document.getElementById('res-txt').style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('res-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up" style="color:#00ffcc"></i>' : '<i class="fas fa-arrow-circle-down" style="color:#ff3333"></i>';
            
            // এই টেক্সটগুলো এপিআই থেকে আসবে, এখন ডেমো হিসেবে আপনার লজিক দেখাচ্ছে
            document.getElementById('reason-text').innerText = "SMC Logic: Liquidity sweep at PDH + FVG Filling confirmed. Strong Put potential based on Price Action.";
            document.getElementById('conf-display').innerText = `CONFIDENCE: ${Math.floor(Math.random() * 20) + 75}%`;
        }

        function resetApp() {
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('upload-status').innerText = "UPLOAD CHART";
        }
    </script>
</body>
</html>
