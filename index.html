<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - V1 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        #main-app { height: 100%; display: flex; flex-direction: column; padding: 25px; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(32px, 8vw, 42px); line-height: 1.1; font-weight: 900; background: linear-gradient(to bottom, #ffffff 30%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 40px 20px; flex-grow: 0; min-height: 420px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #side-menu { display: none; position: fixed; inset: 0; width: 80%; background: #080808; z-index: 10001; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 22px; color: #fff; border-bottom: 1px solid #111; font-weight: 700; text-transform: uppercase; font-size: 17px; }
        .upload-area { width: 100%; border: 2px dashed #222; border-radius: 30px; padding: 50px 15px; text-align: center; background: #030303; cursor: pointer; }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 22px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 30px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 25px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        #scan-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .radar-circle { width: 220px; height: 220px; border: 2px solid #004433; border-radius: 50%; position: relative; overflow: hidden; }
        .radar-circle::after { content: ''; position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, transparent, #00ffcc); transform-origin: bottom right; animation: rotate 1.5s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .timer-bar { font-family: 'Orbitron'; font-size: 20px; color: #00ffcc; margin-top: 5px; }
        .reason-box { font-size: 12px; color: #666; margin-top: 15px; text-align: center; font-style: italic; }
        .next-btn { background: #00ffcc; color: #000; padding: 12px 30px; border-radius: 15px; font-weight: 900; font-size: 14px; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-page" class="fixed inset-0 z-[20001] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-5 text-center text-cyan-400 font-bold outline-none" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-12 text-center text-cyan-400 font-bold outline-none" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black text-lg uppercase tracking-widest">Login</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-12">
            <h1 style="font-family: 'Orbitron';" class="text-xl text-cyan-400 font-bold">PRO MENU</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="menu-item" onclick="modeSelect('FUTURE SIGNAL')"><i class="fas fa-chart-line text-cyan-400 w-8"></i>Future Signal</div>
        <div class="menu-item" onclick="modeSelect('10s COMPOUNDING')"><i class="fas fa-bolt text-yellow-400 w-8"></i>10s Compound</div>
        <div class="menu-item" onclick="modeSelect('LIVE ANALYZER')"><i class="fas fa-microchip text-purple-400 w-8"></i>Live Analyzer</div>
        <div class="menu-item text-red-500 mt-20" onclick="location.reload()">Logout</div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-bold text-cyan-400 uppercase">SELECT ASSET</h2><i class="fas fa-times text-3xl text-gray-600" onclick="closeModal('market-modal')"></i></div>
        <div id="future-opt" class="hidden mb-8 bg-[#0a0a0a] p-5 rounded-2xl border border-[#222]">
            <p class="text-xs text-gray-500 mb-3 uppercase font-bold">Signal Count</p>
            <select id="sig-qty" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-cyan-400 font-bold outline-none">
                <option value="5">5 Signals</option><option value="10">10 Signals</option><option value="15">15 Signals</option>
            </select>
        </div>
        <div id="list-markets">
            <script>
                const mlist = ["NZD/CHF (OTC)", "USD/MXN (OTC)", "USD/ARS (OTC)", "NZD/USD (OTC)", "USD/DZD (OTC)", "USD/INR (OTC)", "USD/EGP (OTC)", "USD/BRL (OTC)", "AUD/NZD (OTC)", "CAD/CHF (OTC)", "USD/PKR (OTC)", "USD/IDR (OTC)", "USD/BDT (OTC)", "NZD/CAD (OTC)", "USD/PHP (OTC)", "USD/NGN (OTC)", "USD/COP (OTC)", "USD/ZAR (OTC)", "GBP/NZD (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-chevron-right text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <div id="future-list-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-bold text-cyan-400 uppercase">FUTURE LIST</h2><i class="fas fa-times text-3xl text-gray-600" onclick="closeModal('future-list-modal')"></i></div>
        <div id="future-container" class="space-y-3 mb-10"></div>
        <button onclick="copySignals()" class="w-full bg-cyan-500 p-5 rounded-2xl text-black font-bold uppercase">Copy All Signals</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h2 class="text-2xl font-black italic text-white tracking-tighter">BURAK X <span class="text-cyan-500">V1</span></h2>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME<br>BROTHER</h1>
                    <p class="text-[11px] text-gray-700 mt-6 tracking-[8px] uppercase font-bold">System Online</p>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div class="upload-area" onclick="triggerGallery()">
                        <i class="fas fa-upload text-4xl text-cyan-400/20 mb-4"></i>
                        <h1 class="text-lg font-black text-gray-600 italic uppercase">UPLOAD CHART SCREENSHOT</h1>
                        <p class="text-[9px] text-gray-800 mt-3 tracking-widest font-bold uppercase">Tap to Gallery</p>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="handleFile()">
                </div>

                <div id="ui-mode" class="hidden text-center">
                    <div id="mode-icon" class="text-7xl mb-4"></div>
                    <h1 id="mode-title" class="text-2xl font-black text-white italic uppercase"></h1>
                    <p id="mode-market" class="text-xs text-cyan-400 mt-4 uppercase tracking-[5px] font-bold bg-cyan-950/30 px-5 py-2 rounded-full inline-block"></p>
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center">
                    <p class="text-[10px] text-cyan-500 font-bold uppercase tracking-[4px] mb-2 animate-pulse">ANALYSIS COMPLETE</p>
                    <div id="res-icon" class="text-[140px] leading-none mb-4"></div>
                    <h1 id="res-txt" class="text-5xl font-black italic uppercase"></h1>
                    
                    <div id="timer-box" class="hidden flex flex-col items-center">
                        <p class="text-[9px] text-gray-600 mt-3 uppercase font-bold tracking-widest">Time Remaining</p>
                        <div id="countdown" class="timer-bar">10s</div>
                        <button id="next-scan-btn" onclick="startProcess()" class="next-btn hidden">Next Analysis</button>
                    </div>

                    <div id="reason-text" class="reason-box"></div>
                    <button id="back-btn" onclick="resetApp()" class="mt-8 text-[10px] text-gray-700 uppercase tracking-[4px] border border-gray-900 px-8 py-2 rounded-full">New Scan</button>
                </div>
            </div>
            <button id="btn-main" onclick="startProcess()" class="hidden action-btn">Execute Analysis</button>
        </div>
    </div>

    <div id="scan-overlay"><div class="radar-circle mb-12"></div><p class="text-cyan-400 font-bold tracking-[8px] animate-pulse text-xl uppercase italic">Quantum Scanning...</p></div>

    <script>
        let mode = ""; let market = ""; let timer;

        function doLogin() {
            if(document.getElementById('uid').value === "Arif09" && document.getElementById('ukey').value === "Arif@098") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            } else alert("Invalid Credentials");
        }

        function toggleMenu() {
            const sm = document.getElementById('side-menu');
            sm.style.display = (sm.style.display === 'block') ? 'none' : 'block';
        }

        function modeSelect(m) {
            mode = m; toggleMenu(); resetApp();
            if(mode === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else {
                document.getElementById('future-opt').className = (mode === 'FUTURE SIGNAL') ? 'block mb-8 bg-[#0a0a0a] p-5 rounded-2xl border border-[#222]' : 'hidden';
                document.getElementById('market-modal').style.display = 'block';
            }
        }

        function pickMarket(n) {
            market = n; closeModal('market-modal');
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('ui-mode').classList.remove('hidden');
            document.getElementById('btn-main').classList.remove('hidden');
            document.getElementById('mode-title').innerText = mode;
            document.getElementById('mode-market').innerText = n;
            document.getElementById('mode-icon').innerHTML = (mode === '10s COMPOUNDING') ? '<i class="fas fa-bolt text-yellow-400"></i>' : '<i class="fas fa-chart-line text-cyan-400"></i>';
        }

        // Gallery Trigger Fix
        function triggerGallery() {
            document.getElementById('inp-file').click();
        }

        function handleFile() {
            const file = document.getElementById('inp-file').files[0];
            if(file) {
                runScan(4000, showFinal);
            }
        }

        function startProcess() {
            if(mode === '10s COMPOUNDING') runScan(2500, showFinal);
            else if(mode === 'FUTURE SIGNAL') runScan(3500, showFutureList);
        }

        function runScan(t, cb) {
            document.getElementById('scan-overlay').style.display = 'flex';
            document.getElementById('ui-result').classList.add('hidden');
            setTimeout(() => { 
                document.getElementById('scan-overlay').style.display = 'none'; 
                cb(); 
            }, t);
        }

        function showFinal() {
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('ui-mode').classList.add('hidden');
            document.getElementById('btn-main').classList.add('hidden');
            document.getElementById('ui-result').classList.remove('hidden');
            
            const call = Math.random() > 0.5;
            const resTxt = document.getElementById('res-txt');
            const resIcon = document.getElementById('res-icon');
            const reason = document.getElementById('reason-text');
            
            resTxt.innerText = call ? "CALL ↑" : "PUT ↓";
            resTxt.style.color = call ? "#00ffcc" : "#ff3333";
            resIcon.innerHTML = call ? '<i class="fas fa-arrow-up" style="color:#00ffcc"></i>' : '<i class="fas fa-arrow-down" style="color:#ff3333"></i>';
            
            const reasons = ["Momentum Strategy Confirmed", "RSI Overbought Area Exit", "Market Support Bounce", "Trendline Resistance Hit", "Candle Pattern: Hammer"];
            reason.innerText = "Logic: " + reasons[Math.floor(Math.random() * reasons.length)];

            if(mode === '10s COMPOUNDING') {
                document.getElementById('timer-box').classList.remove('hidden');
                document.getElementById('next-scan-btn').classList.add('hidden');
                document.getElementById('back-btn').classList.add('hidden');
                startTimer();
            } else {
                document.getElementById('timer-box').classList.add('hidden');
                document.getElementById('back-btn').classList.remove('hidden');
            }
        }

        function startTimer() {
            let timeLeft = 10;
            const cd = document.getElementById('countdown');
            const nextBtn = document.getElementById('next-scan-btn');
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                cd.innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    cd.innerText = "EXPIRED";
                    nextBtn.classList.remove('hidden'); 
                }
            }, 1000);
        }

        function showFutureList() {
            const qty = document.getElementById('sig-qty').value;
            const container = document.getElementById('future-container');
            container.innerHTML = "";
            let signalText = "BURAK X V1 SIGNALS:\n";
            for(let i=0; i<qty; i++) {
                const now = new Date();
                const futureTime = new Date(now.getTime() + (i+1)*5*60000);
                const timeStr = futureTime.toLocaleTimeString('en-US', {hour12: false, hour: '2-digit', minute:'2-digit'});
                const type = Math.random() > 0.5 ? "CALL ↑" : "PUT ↓";
                container.innerHTML += `<div class="market-row"><span>${timeStr} - ${market}</span><span class="${type.includes('CALL')?'text-cyan-400':'text-red-500'} font-black">${type}</span></div>`;
                signalText += `${timeStr} | ${market} | ${type}\n`;
            }
            window.latestSignals = signalText;
            document.getElementById('future-list-modal').style.display = 'block';
        }

        function copySignals() {
            navigator.clipboard.writeText(window.latestSignals);
            alert("All signals copied to clipboard!");
        }

        function resetApp() {
            clearInterval(timer);
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('ui-mode').classList.add('hidden');
            document.getElementById('btn-main').classList.add('hidden');
            document.getElementById('inp-file').value = ""; // ফাইল রিসেট
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
