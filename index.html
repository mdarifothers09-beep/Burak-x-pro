<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - V1 ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(30px, 7vw, 40px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px 20px; min-height: 450px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 50px rgba(0,255,204,0.05); }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 25px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; transition: 0.3s; }
        
        /* এনিমেশন আপডেট - আপনার স্ক্রিনশট অনুযায়ী */
        #scan-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-line { width: 250px; height: 2px; background: #00ffcc; position: absolute; box-shadow: 0 0 15px #00ffcc; animation: scanMove 2s linear infinite; }
        @keyframes scanMove { 0% { transform: translateY(-100px); } 100% { transform: translateY(100px); } }
        .radar-box { width: 200px; height: 200px; border: 1px solid #00ffcc; position: relative; display: flex; align-items: center; justify-content: center; }

        .reason-box { font-size: 13px; color: #00ffcc; margin-top: 15px; text-align: center; background: rgba(0, 255, 204, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(0, 255, 204, 0.1); width: 100%; height: 100px; overflow-y: auto; }
        #side-menu { display: none; position: fixed; inset: 0; width: 85%; background: #080808; z-index: 30000; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
        #timer-display { font-size: 60px; font-family: 'Orbitron'; color: #00ffcc; margin-bottom: 10px; }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            USERNAME: "Arif09",
            PASSWORD: "Arif@098",
            GPT_VISION_KEY: "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", 
            PREMIUM_OTC_KEY: "YOUR_PREMIUM_OTC_KEY",
            WS_LINK: "wss://ws2.qx.trade/socket.io/?EIO=4&transport=websocket"
        };

        let currentMode = "";
        let selectedMarket = "";
        
        function connectOTC() {
            let socket = new WebSocket(CONFIG.WS_LINK);
            socket.onopen = () => { document.getElementById('active-market').innerText = "Synced with OTC Server"; document.getElementById('active-market').style.color = "#00ffcc"; };
        }
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-4 text-center text-cyan-400 font-bold" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-10 text-center text-cyan-400 font-bold" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black uppercase">Unlock BX AI</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl text-cyan-400 font-bold uppercase">BX MENU</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="space-y-4">
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center border border-[#111]" onclick="goHome()">
                <i class="fas fa-home mr-4 text-gray-400"></i> HOME
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center border border-[#111]" onclick="modeSelect('FUTURE SIGNAL')">
                <i class="fas fa-chart-line mr-4 text-cyan-400"></i> Future Signal
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center border border-[#111]" onclick="modeSelect('10s COMPOUNDING')">
                <i class="fas fa-bolt mr-4 text-yellow-400"></i> 10s Compound
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center border border-[#111]" onclick="modeSelect('LIVE ANALYZER')">
                <i class="fas fa-microscope mr-4 text-purple-400"></i> Live Analyzer
            </div>
            <div class="p-5 text-red-500 mt-20 flex items-center" onclick="location.reload()">
                <i class="fas fa-sign-out-alt mr-4"></i> Logout
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h1 id="header-title" style="font-family: 'Orbitron';" class="text-xl font-black text-cyan-400 uppercase flex-grow text-center">BURAK 亗 JINN</h1>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br>BROTHER</h1>
                    <p id="active-market" class="text-[10px] text-gray-700 mt-6 tracking-[8px] uppercase">Connecting Server...</p>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-12 bg-[#030303]" onclick="triggerGallery()">
                        <i class="fas fa-camera text-4xl text-cyan-400 mb-4 opacity-30"></i>
                        <h1 id="upload-status" class="text-lg font-black text-gray-600 uppercase">Upload Chart Screenshot</h1>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <div id="timer-box" class="hidden">
                        <div id="timer-display">10</div>
                        <p class="text-xs text-cyan-500 tracking-widest">ANALYZING CANDLES</p>
                    </div>
                    
                    <div id="final-signal-box" class="hidden flex flex-col items-center">
                        <h2 class="text-cyan-400 font-bold mb-4 tracking-widest uppercase">Analysis Complete</h2>
                        <div id="res-icon" class="text-[100px] leading-none mb-2"></div>
                        <h1 id="res-txt" class="text-3xl font-black italic uppercase"></h1>
                        <div id="conf-display" class="text-orange-500 font-bold mt-2 text-xs"></div>
                        <div id="reason-text" class="reason-box"></div>
                        <button onclick="nextAnalysis()" class="mt-6 text-[12px] text-black bg-[#00ffcc] font-black px-10 py-4 rounded-full uppercase tracking-widest">Next Analysis</button>
                    </div>
                </div>
            </div>
            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">Run SMC Analysis</button>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-cyan-400 uppercase">Select Market</h2>
            <i class="fas fa-times text-3xl" onclick="closeModal('market-modal')"></i>
        </div>
        <div id="list-markets">
            <script>
                const mlist = ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "NZD/USD (OTC)", "AUD/USD (OTC)", "USD/MXN (OTC)", "USD/ZAR (OTC)", "GBP/JPY (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus-circle text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <div id="scan-overlay">
        <div class="radar-box">
            <div class="scanner-line"></div>
            <i class="fas fa-microchip text-4xl text-cyan-400 opacity-20"></i>
        </div>
        <p id="scan-text" class="text-cyan-400 font-bold mt-8 tracking-[5px] animate-pulse">EXTRACTING DATA...</p>
    </div>

    <script>
        function doLogin() {
            if(document.getElementById('uid').value === CONFIG.USERNAME && document.getElementById('ukey').value === CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                connectOTC();
            } else alert("INVALID ACCESS");
        }

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function goHome() {
            toggleMenu();
            currentMode = "";
            selectedMarket = "";
            resetToInitial();
            document.getElementById('header-title').innerText = "BURAK 亗 JINN";
        }

        function modeSelect(m) {
            currentMode = m;
            toggleMenu(); 
            resetToInitial();
            document.getElementById('header-title').innerText = m;
            if(m === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else {
                document.getElementById('market-modal').style.display = 'block';
            }
        }

        function pickMarket(m) {
            selectedMarket = m;
            document.getElementById('market-modal').style.display = 'none';
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('active-market').innerText = "Market: " + m;
            document.getElementById('active-market').parentElement.classList.remove('hidden');
            document.getElementById('btn-execute').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function triggerGallery() { document.getElementById('inp-file').click(); }
        function fileSelected() {
            if(document.getElementById('inp-file').files[0]) {
                document.getElementById('upload-status').innerText = "Chart Uploaded Successfully";
                document.getElementById('btn-execute').classList.remove('hidden');
            }
        }

        async function startProcess() {
            document.getElementById('scan-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('scan-overlay').style.display = 'none';
                showResultUI();
            }, 3000);
        }

        function showResultUI() {
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('ui-result').classList.remove('hidden');
            
            if(currentMode === '10s COMPOUNDING') {
                document.getElementById('timer-box').classList.remove('hidden');
                document.getElementById('final-signal-box').classList.add('hidden');
                startTimer();
            } else {
                document.getElementById('timer-box').classList.add('hidden');
                document.getElementById('final-signal-box').classList.remove('hidden');
                generateSignal();
            }
        }

        function startTimer() {
            let time = 10;
            const display = document.getElementById('timer-display');
            const interval = setInterval(() => {
                time--;
                display.innerText = time;
                if(time <= 0) {
                    clearInterval(interval);
                    document.getElementById('timer-box').classList.add('hidden');
                    document.getElementById('final-signal-box').classList.remove('hidden');
                    generateSignal();
                }
            }, 1000);
        }

        function generateSignal() {
            const isCall = Math.random() > 0.5;
            const resTxt = document.getElementById('res-txt');
            const now = new Date();
            const timeStr = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();

            if(currentMode === 'FUTURE SIGNAL') {
                // আপনার স্ক্রিনশট অনুযায়ী ফিউচার সিগন্যাল ফরম্যাট
                resTxt.innerText = `${timeStr} - ${selectedMarket} - ${isCall ? 'CALL ↑' : 'PUT ↓'}`;
                resTxt.classList.remove('text-3xl');
                resTxt.classList.add('text-xl');
            } else {
                resTxt.innerText = isCall ? "CALL ↑" : "PUT ↓";
                resTxt.classList.add('text-3xl');
            }

            resTxt.style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('res-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up" style="color:#00ffcc"></i>' : '<i class="fas fa-arrow-circle-down" style="color:#ff3333"></i>';
            document.getElementById('conf-display').innerText = `CONFIDENCE: ${Math.floor(Math.random() * 20) + 76}%`;
            document.getElementById('reason-text').innerText = "SMC/ICT Analysis: Liquidity sweep detected at PDH. Market Structure Shift (MSS) confirmed on 1m timeframe. Strong rejection from Order Block.";
        }

        // --- Next Analysis বাটন ক্লিক করলে যা হবে ---
        function nextAnalysis() {
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('final-signal-box').classList.add('hidden');
            document.getElementById('timer-display').innerText = "10";
            
            if(currentMode === 'LIVE ANALYZER') {
                document.getElementById('ui-analyzer').classList.remove('hidden');
                document.getElementById('upload-status').innerText = "Upload Chart Screenshot";
                document.getElementById('inp-file').value = "";
            } else {
                // ফিউচার এবং ১০ সেকেন্ড মোডে মার্কেট আগে থেকেই সিলেক্ট করা থাকবে
                document.getElementById('btn-execute').classList.remove('hidden');
                document.getElementById('ui-welcome').classList.remove('hidden');
            }
        }

        function resetToInitial() {
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('inp-file').value = "";
            document.getElementById('upload-status').innerText = "Upload Chart Screenshot";
        }
    </script>
</body>
</html>
