<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - V1 ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(30px, 7vw, 40px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px 20px; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 50px rgba(0,255,204,0.05); }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,255,204,0.2); transition: 0.3s; }
        .action-btn:active { transform: scale(0.95); opacity: 0.8; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 25px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        
        /* New Animated Scanner from Screenshot */
        #scan-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-container { width: 220px; height: 220px; position: relative; border-radius: 50%; border: 2px solid rgba(0, 255, 204, 0.1); box-shadow: 0 0 40px rgba(0, 255, 204, 0.05); }
        .scan-line { width: 100%; height: 2px; background: #00ffcc; position: absolute; top: 0; left: 0; box-shadow: 0 0 20px #00ffcc; animation: scan 2s linear infinite; z-index: 2; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .radar-glow { position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent, rgba(0, 255, 204, 0.4)); border-radius: 50%; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .reason-box { font-size: 13px; color: #00ffcc; margin-top: 15px; text-align: center; background: rgba(0, 255, 204, 0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.1); width: 100%; height: 100px; overflow-y: auto; }
        #side-menu { display: none; position: fixed; inset: 0; width: 85%; background: #080808; z-index: 30000; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
        .timer-circle { font-size: 50px; font-family: 'Orbitron'; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; }
    </style>
</head>
<body>

    <script>
        const CONFIG = {
            USERNAME: "Arif09",
            PASSWORD: "Arif@098",
            GPT_VISION_KEY: "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", 
            PREMIUM_OTC_KEY: "YOUR_PREMIUM_OTC_KEY",
            WS_LINK: "wss://ws2.qx.trade/socket.io/?EIO=4&transport=websocket"
        };

        let currentMode = "";
        let selectedMarket = "";
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-4 text-center text-cyan-400 font-bold" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-10 text-center text-cyan-400 font-bold" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black uppercase">Unlock BX AI</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl text-cyan-400 font-bold uppercase tracking-widest">BX MENU</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="space-y-4">
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center border border-[#111]" onclick="goHome()">
                <i class="fas fa-home mr-4 text-gray-400"></i> HOME
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center border border-[#111]" onclick="modeSelect('FUTURE SIGNAL')">
                <i class="fas fa-chart-line mr-4 text-cyan-400"></i> Future Signal
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center border border-[#111]" onclick="modeSelect('10s COMPOUNDING')">
                <i class="fas fa-bolt mr-4 text-yellow-400"></i> 10s Compound
            </div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center border border-[#111]" onclick="modeSelect('LIVE ANALYZER')">
                <i class="fas fa-microscope mr-4 text-purple-400"></i> Live Analyzer
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h1 id="header-title" style="font-family: 'Orbitron';" class="text-xl font-black text-cyan-400 uppercase flex-grow text-center">BURAK 亗 JINN</h1>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br>BROTHER</h1>
                    <p id="active-market" class="text-[10px] text-gray-700 mt-6 tracking-[8px] uppercase">Synced with OTC Server</p>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div id="upload-box" class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-12 bg-[#030303]" onclick="triggerGallery()">
                        <i class="fas fa-camera text-4xl text-cyan-400 mb-4 opacity-30"></i>
                        <h1 id="upload-status" class="text-lg font-black text-gray-600">UPLOAD CHART</h1>
                    </div>
                    <p id="selected-market-display" class="mt-4 text-cyan-400 font-bold uppercase"></p>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <div id="timer-box" class="timer-circle mb-4 hidden">10</div>
                    <h2 class="text-cyan-400 font-bold mb-1">ANALYSIS COMPLETE</h2>
                    <div id="res-icon" class="text-[90px] leading-none mb-2"></div>
                    <h1 id="res-txt" class="text-5xl font-black italic uppercase"></h1>
                    <div id="conf-display" class="text-orange-500 font-bold mt-1 text-xs"></div>
                    <div id="reason-text" class="reason-box"></div>
                    <button onclick="nextAnalysis()" class="mt-6 text-[12px] text-black bg-[#00ffcc] font-black px-10 py-4 rounded-full uppercase tracking-widest">Next Analysis</button>
                </div>
            </div>
            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">RUN SMC ANALYSIS</button>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-cyan-400">SELECT ASSET</h2>
            <i class="fas fa-times text-3xl" onclick="closeModal('market-modal')"></i>
        </div>
        <div id="list-markets">
            <script>
                const mlist = ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "NZD/USD (OTC)", "AUD/USD (OTC)", "USD/PKR (OTC)", "USD/IDR (OTC)", "GBP/JPY (OTC)", "CAD/CHF (OTC)", "NZD/CAD (OTC)", "AUD/NZD (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus-circle text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <div id="scan-overlay">
        <div class="scanner-container">
            <div class="radar-glow"></div>
            <div class="scan-line"></div>
        </div>
        <p id="scan-text" class="text-cyan-400 font-bold tracking-[5px] mt-10 animate-pulse uppercase">Scanning SMC Market...</p>
    </div>

    <script>
        function doLogin() {
            if(document.getElementById('uid').value === CONFIG.USERNAME && document.getElementById('ukey').value === CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            } else alert("INVALID ACCESS");
        }

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function goHome() {
            toggleMenu();
            currentMode = "";
            resetToInitial();
            document.getElementById('header-title').innerText = "BURAK 亗 JINN";
        }

        function modeSelect(m) {
            currentMode = m;
            toggleMenu();
            document.getElementById('header-title').innerText = m;
            resetToInitial();
            
            if(m === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
                document.getElementById('selected-market-display').innerText = "";
            } else {
                document.getElementById('market-modal').style.display = 'block';
            }
        }

        function pickMarket(m) {
            selectedMarket = m;
            document.getElementById('market-modal').style.display = 'none';
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('ui-analyzer').classList.remove('hidden');
            document.getElementById('selected-market-display').innerText = "Market: " + m;
            document.getElementById('upload-status').innerText = "UPLOAD CHART";
        }

        function triggerGallery() { document.getElementById('inp-file').click(); }
        function fileSelected() {
            if(document.getElementById('inp-file').files[0]) {
                document.getElementById('upload-status').innerText = "CHART READY";
                document.getElementById('btn-execute').classList.remove('hidden');
            }
        }

        function startProcess() {
            document.getElementById('scan-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('scan-overlay').style.display = 'none';
                showFinal();
            }, 3000);
        }

        function showFinal() {
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('ui-result').classList.remove('hidden');
            
            if(currentMode === '10s COMPOUNDING') {
                document.getElementById('timer-box').classList.remove('hidden');
                let timeLeft = 10;
                const itv = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-box').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(itv);
                        document.getElementById('timer-box').classList.add('hidden');
                        displaySignal();
                    }
                }, 1000);
            } else {
                displaySignal();
            }
        }

        function displaySignal() {
            const isCall = Math.random() > 0.5;
            const resTxt = document.getElementById('res-txt');
            resTxt.innerText = isCall ? "CALL ↑" : "PUT ↓";
            resTxt.style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('res-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up" style="color:#00ffcc"></i>' : '<i class="fas fa-arrow-circle-down" style="color:#ff3333"></i>';
            document.getElementById('conf-display').innerText = `CONFIDENCE: ${Math.floor(Math.random() * 15) + 80}%`;
            
            if(currentMode === 'FUTURE SIGNAL') {
                document.getElementById('reason-text').innerText = "FUTURE SIGNAL: Next Candle predicted at " + new Date().getHours() + ":" + (new Date().getMinutes()+1) + " for 1 Minute duration. Logic: SMC Breaker Block detected.";
            } else {
                document.getElementById('reason-text').innerText = "SMC Logic: Liquidity sweep at PDH confirmed. FVG filling. Order Block rejection seen in current timeframe.";
            }
        }

        function nextAnalysis() {
            // লাইভ এনালাইজারের মতো এখন সব মোডেই সরাসরি আপলোড স্ক্রিনে ফেরত যাবে
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('ui-analyzer').classList.remove('hidden');
            document.getElementById('upload-status').innerText = "UPLOAD CHART";
            document.getElementById('btn-execute').classList.add('hidden');
            document.getElementById('timer-box').innerText = "10";
            document.getElementById('inp-file').value = ""; // Clear file
        }

        function resetToInitial() {
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('ui-result').classList.add('hidden');
            document.getElementById('btn-execute').classList.add('hidden');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
