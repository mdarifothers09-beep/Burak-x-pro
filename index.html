<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - DATABASE V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(30px, 7vw, 40px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 25px; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-top: 2px solid #00ffcc22; }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 18px; border-radius: 20px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 20px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 20px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: 700; }
        #timer-display { font-size: 40px; font-family: 'Orbitron'; color: #00ffcc; font-weight: 900; }
        .signal-list { width: 100%; max-height: 320px; overflow-y: auto; margin-top: 10px; }
        .signal-item { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 14px; }
        #side-menu { display: none; position: fixed; inset: 0; width: 85%; background: #080808; z-index: 30000; padding: 50px 25px; border-right: 1px solid #1a1a1a; }
        .reason-box { font-size: 12px; color: #00ffcc; margin-top: 15px; text-align: center; background: rgba(0, 255, 204, 0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(0, 255, 204, 0.1); width: 100%; height: 90px; overflow-y: auto; }
        .scanner-line { height: 2px; background: #00ffcc; width: 100%; position: absolute; box-shadow: 0 0 15px #00ffcc; animation: scanMove 2s linear infinite; }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <script>
        // --- CONFIG & FIREBASE ---
        const CONFIG = {
            USERNAME: "Arif09",
            PASSWORD: "Arif@098",
            GPT_VISION_KEY: "sk-proj-YOUR_KEY", 
            PREMIUM_OTC_KEY: "YOUR_OTC_KEY",
            WS_LINK: "wss://ws2.qx.trade/socket.io/?EIO=4&transport=websocket",
            // Firebase Config (প্যানেল থেকে এখানে কপি করে বসান)
            FIREBASE: {
                apiKey: "YOUR_API_KEY",
                databaseURL: "YOUR_DATABASE_URL",
                projectId: "YOUR_PROJECT_ID"
            }
        };

        // Initialize Firebase
        if(CONFIG.FIREBASE.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(CONFIG.FIREBASE);
        }

        let currentMode = "";
        let selectedMarket = "";
        let selectedQty = 5;
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-4 text-center text-cyan-400 font-bold outline-none" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-10 text-center text-cyan-400 font-bold outline-none" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black uppercase">Unlock BX AI</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10"><h1 class="text-xl text-cyan-400 font-bold uppercase">BX MENU</h1><i class="fas fa-times text-2xl" onclick="toggleMenu()"></i></div>
        <div class="space-y-4">
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center" onclick="goHome()"><i class="fas fa-home mr-4"></i> HOME</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('FUTURE SIGNAL')"><i class="fas fa-chart-line mr-4 text-cyan-400"></i> Future Signal</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('10s COMPOUNDING')"><i class="fas fa-bolt mr-4 text-yellow-400"></i> 10s Compound</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('LIVE ANALYZER')"><i class="fas fa-microscope mr-4 text-purple-400"></i> Live Analyzer</div>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h1 id="header-title" style="font-family: 'Orbitron';" class="text-lg font-black text-cyan-400 uppercase flex-grow text-center">BURAK 亗 JINN</h1>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br> MASTER</h1>
                    <p id="active-market" class="text-[10px] text-cyan-500 mt-6 tracking-[8px] uppercase">Synced with OTC Server</p>
                </div>

                <div id="ui-future-settings" class="hidden w-full text-center">
                    <h2 class="text-cyan-400 font-bold mb-6 uppercase tracking-widest text-sm">Select Qty</h2>
                    <div class="grid grid-cols-3 gap-3 px-2 mb-6">
                        <button onclick="setQty(5)" class="qty-btn bg-[#0a0a0a] border border-cyan-900 py-3 rounded-xl font-bold">5</button>
                        <button onclick="setQty(10)" class="qty-btn bg-[#0a0a0a] border border-cyan-900 py-3 rounded-xl font-bold">10</button>
                        <button onclick="setQty(15)" class="qty-btn bg-[#0a0a0a] border border-cyan-900 py-3 rounded-xl font-bold">15</button>
                    </div>
                </div>

                <div id="ui-analyzer" class="hidden w-full text-center px-5">
                    <div class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-14 bg-[#030303] relative overflow-hidden" onclick="triggerGallery()">
                        <div id="scan-line-box" class="hidden scanner-line"></div>
                        <i class="fas fa-camera text-4xl text-cyan-400 mb-4 opacity-30"></i>
                        <h1 id="upload-status" class="text-sm font-black text-gray-600 uppercase">Upload Chart</h1>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <div id="comp-box" class="hidden flex flex-col items-center">
                        <div id="comp-icon" class="text-[120px] mb-2 leading-none"></div>
                        <h1 id="comp-txt" class="text-5xl font-black italic mb-4"></h1>
                        <div id="timer-display">10</div>
                    </div>
                    
                    <div id="signal-box" class="hidden flex flex-col items-center w-full">
                        <div id="single-ui" class="flex flex-col items-center">
                            <div id="res-icon" class="text-[100px] leading-none mb-2"></div>
                            <h1 id="res-txt" class="text-3xl font-black italic"></h1>
                        </div>
                        <div id="future-list-ui" class="hidden signal-list"></div>
                        <div id="reason-ui" class="reason-box"></div>
                        <button onclick="nextAnalysis()" class="mt-6 text-[12px] text-black bg-[#00ffcc] font-black px-12 py-4 rounded-full uppercase">Next Analysis</button>
                    </div>
                </div>
            </div>
            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">Run AI Analysis</button>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-bold text-cyan-400 uppercase">Markets</h2><i class="fas fa-times text-2xl" onclick="closeModal()"></i></div>
        <div id="list-markets">
            <script>
                const mlist = ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "NZD/USD (OTC)", "AUD/USD (OTC)", "USD/MXN (OTC)", "USD/ARS (OTC)", "USD/PKR (OTC)", "USD/TRY (OTC)", "GBP/JPY (OTC)", "CHF/JPY (OTC)", "CAD/JPY (OTC)", "EUR/JPY (OTC)", "GBP/CHF (OTC)", "USD/ZAR (OTC)", "AUD/CAD (OTC)", "EUR/GBP (OTC)", "USD/EGP (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus-circle text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <script>
        function doLogin() {
            if(document.getElementById('uid').value === CONFIG.USERNAME && document.getElementById('ukey').value === CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            } else alert("Denied!");
        }

        function toggleMenu() { const m = document.getElementById('side-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function goHome() { toggleMenu(); currentMode = ""; resetUIs(); document.getElementById('ui-welcome').classList.remove('hidden'); }

        function modeSelect(m) {
            currentMode = m; toggleMenu(); resetUIs();
            document.getElementById('header-title').innerText = m;
            if(m === 'LIVE ANALYZER') {
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else { document.getElementById('market-modal').style.display = 'block'; }
        }

        function pickMarket(m) {
            selectedMarket = m; closeModal();
            if(currentMode === 'FUTURE SIGNAL') document.getElementById('ui-future-settings').classList.remove('hidden');
            else { 
                document.getElementById('ui-welcome').classList.remove('hidden');
                document.getElementById('active-market').innerText = "Market: " + m;
            }
            document.getElementById('btn-execute').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('market-modal').style.display = 'none'; }
        function triggerGallery() { document.getElementById('inp-file').click(); }
        function fileSelected() { if(document.getElementById('inp-file').files[0]) { document.getElementById('upload-status').innerText = "CHART READY"; document.getElementById('btn-execute').classList.remove('hidden'); } }
        function setQty(q) { selectedQty = q; document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('border-cyan-400', 'bg-cyan-900/20')); event.target.classList.add('border-cyan-400', 'bg-cyan-900/20'); }

        function startProcess() {
            document.getElementById('scan-line-box').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('scan-line-box').classList.add('hidden');
                showFinalResults();
            }, 2500);
        }

        function showFinalResults() {
            resetUIs(); 
            document.getElementById('ui-result').classList.remove('hidden');
            
            if(currentMode === '10s COMPOUNDING') {
                document.getElementById('comp-box').classList.remove('hidden');
                run10s();
            } else if(currentMode === 'FUTURE SIGNAL') {
                document.getElementById('signal-box').classList.remove('hidden');
                document.getElementById('single-ui').classList.add('hidden');
                document.getElementById('future-list-ui').classList.remove('hidden');
                renderFutureList();
            } else {
                document.getElementById('signal-box').classList.remove('hidden');
                document.getElementById('single-ui').classList.remove('hidden');
                document.getElementById('future-list-ui').classList.add('hidden');
                renderSingleLogic();
            }
        }

        function run10s() {
            let t = 10; const isCall = Math.random() > 0.5;
            document.getElementById('comp-txt').innerText = isCall ? "CALL ↑" : "PUT ↓";
            document.getElementById('comp-txt').style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('comp-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up text-cyan-400"></i>' : '<i class="fas fa-arrow-circle-down text-red-500"></i>';
            const inv = setInterval(() => {
                t--; document.getElementById('timer-display').innerText = t;
                if(t<=0) { 
                    clearInterval(inv); 
                    document.getElementById('signal-box').classList.remove('hidden');
                    document.getElementById('single-ui').classList.add('hidden');
                    document.getElementById('reason-ui').innerText = "10s SMC Logic: High liquidity zone rejected. Pulse confirmed.";
                }
            }, 1000);
        }

        function renderSingleLogic() {
            const isCall = Math.random() > 0.5;
            document.getElementById('res-txt').innerText = isCall ? "CALL ↑" : "PUT ↓";
            document.getElementById('res-txt').style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('res-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up text-cyan-400"></i>' : '<i class="fas fa-arrow-circle-down text-red-500"></i>';
            document.getElementById('reason-ui').innerText = "AI Vision Logic: SMC FVG filling detected at M1 timeframe. Price Action shows strong rejection.";
        }

        function renderFutureList() {
            const list = document.getElementById('future-list-ui'); list.innerHTML = "";
            let now = new Date();
            for(let i=0; i<selectedQty; i++) {
                now.setMinutes(now.getMinutes() + 2);
                const isCall = Math.random() > 0.5;
                list.innerHTML += `<div class="signal-item" style="border-left: 4px solid ${isCall?'#00ffcc':'#ff3333'}"><span>${now.getHours()}:${(now.getMinutes()<10?'0':'')+now.getMinutes()}</span><b>${selectedMarket}</b><span style="color:${isCall?'#00ffcc':'#ff3333'}">${isCall?'CALL':'PUT'}</span></div>`;
            }
            document.getElementById('reason-ui').innerText = "Future algorithms generated based on OTC market cycles.";
        }

        function nextAnalysis() {
            resetUIs();
            if(currentMode === 'LIVE ANALYZER') {
                document.getElementById('ui-analyzer').classList.remove('hidden');
                document.getElementById('upload-status').innerText = "Upload Chart";
                document.getElementById('inp-file').value = "";
            } else if(currentMode === 'FUTURE SIGNAL') {
                document.getElementById('ui-future-settings').classList.remove('hidden');
            } else {
                document.getElementById('ui-welcome').classList.remove('hidden');
            }
            document.getElementById('btn-execute').classList.remove('hidden');
        }

        function resetUIs() {
            const ids = ['ui-welcome', 'ui-future-settings', 'ui-analyzer', 'ui-result', 'comp-box', 'signal-box', 'btn-execute'];
            ids.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('timer-display').innerText = "10";
        }
    </script>
</body>
</html>
