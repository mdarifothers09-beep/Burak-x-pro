<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BURAK X 亗 - FINAL V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Rajdhani:wght@600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .welcome-text { font-family: 'Orbitron'; font-size: clamp(30px, 7vw, 40px); font-weight: 900; background: linear-gradient(to bottom, #fff 20%, #00ffcc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; text-transform: uppercase; }
        .display-card { width: 100%; background: #050505; border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px 20px; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-top: 2px solid #00ffcc22; }
        .action-btn { width: 100%; background: #00ffcc; color: #000; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 25px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10002; padding: 20px; overflow-y: auto; }
        .market-row { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        #scan-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-line { width: 250px; height: 2px; background: #00ffcc; position: absolute; box-shadow: 0 0 15px #00ffcc; animation: scanMove 2s linear infinite; }
        @keyframes scanMove { 0% { transform: translateY(-100px); } 100% { transform: translateY(100px); } }
        .radar-box { width: 200px; height: 200px; border: 1px solid #00ffcc; position: relative; display: flex; align-items: center; justify-content: center; }

        .reason-box { font-size: 13px; color: #00ffcc; margin-top: 15px; text-align: center; background: rgba(0, 255, 204, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(0, 255, 204, 0.1); width: 100%; height: 100px; overflow-y: auto; }
        #side-menu { display: none; position: fixed; inset: 0; width: 85%; background: #080808; z-index: 30000; border-right: 1px solid #1a1a1a; padding: 50px 25px; }
        
        /* আপনার ছবির মতো ১০ সেকেন্ড টাইমার এবং বড় সিগন্যাল */
        #timer-display { font-size: 30px; font-family: 'Orbitron'; color: #00ffcc; font-weight: 900; }
        #res-txt-10s { font-size: 50px; font-weight: 900; font-style: italic; uppercase; text-shadow: 0 0 10px #00ffcc; line-height: 1.1; }
        #res-icon-10s { font-size: 120px; leading-none: 1; margin-bottom: 5px; }

    </style>
</head>
<body>

    <script>
        // --- এক জায়গায় সব কনফিগারেশন ---
        const MASTER_CONFIG = {
            USERNAME: "Arif09",
            PASSWORD: "Arif@098",
            VISION_API_KEY: "YOUR_VISION_API_KEY", // এখানে আপনার এপিআই কি দিন
            OTC_SERVER_KEY: "YOUR_PREMIUM_OTC_KEY", // এখানে আপনার প্রিমিয়াম ওটিসি কি দিন
            WS_LINK: "wss://ws2.qx.trade/socket.io/?EIO=4&transport=websocket" // ওটিসি লাইভ ডাটা লিঙ্ক
        };

        let currentMode = "";
        let selectedMarket = "";
    </script>

    <div id="login-page" class="fixed inset-0 z-[40000] bg-black flex flex-col items-center justify-center p-10">
        <h1 style="font-family: 'Orbitron';" class="text-4xl text-cyan-400 mb-2 tracking-[10px]">BURAK X</h1>
        <div class="w-full max-w-xs mt-10">
            <input type="text" id="uid" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-4 text-center text-cyan-400 font-bold outline-none" placeholder="ACCESS ID">
            <input type="password" id="ukey" class="w-full bg-[#080808] border border-[#1a1a1a] p-5 rounded-2xl mb-10 text-center text-cyan-400 font-bold outline-none" placeholder="PASSWORD">
            <button onclick="doLogin()" class="w-full bg-cyan-500 py-5 rounded-2xl text-black font-black uppercase">Unlock BX AI</button>
        </div>
    </div>

    <div id="side-menu">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl text-cyan-400 font-bold uppercase">BX MENU</h1>
            <i class="fas fa-times text-2xl" onclick="toggleMenu()"></i>
        </div>
        <div class="space-y-4">
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold flex items-center" onclick="goHome()"><i class="fas fa-home mr-4"></i> HOME</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('FUTURE SIGNAL')"><i class="fas fa-chart-line mr-4 text-cyan-400"></i> Future Signal</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('10s COMPOUNDING')"><i class="fas fa-bolt mr-4 text-yellow-400"></i> 10s Compound</div>
            <div class="p-5 bg-[#0a0a0a] rounded-2xl font-bold uppercase flex items-center" onclick="modeSelect('LIVE ANALYZER')"><i class="fas fa-microscope mr-4 text-purple-400"></i> Live Analyzer</div>
        </div>
    </div>

    <div id="main-app" class="hidden p-6 flex flex-col h-full">
        <div class="flex justify-between items-center py-6">
            <i class="fas fa-bars text-2xl text-cyan-400" onclick="toggleMenu()"></i>
            <h1 id="header-title" style="font-family: 'Orbitron';" class="text-2xl font-black text-cyan-400 uppercase tracking-tighter text-center flex-grow">BURAK 亗 JINN</h1>
            <div class="w-6"></div>
        </div>

        <div class="flex-grow flex flex-col justify-center items-center">
            <div class="display-card">
                <div id="ui-welcome" class="text-center">
                    <h1 class="welcome-text">WELCOME <br>BROTHER</h1>
                    <p id="active-market" class="text-[10px] text-gray-700 mt-6 tracking-[8px] uppercase">Connecting Server...</p>
                </div>

                <div id="ui-analyzer" class="hidden w-full px-5 text-center">
                    <div class="w-full border-2 border-dashed border-[#222] rounded-[30px] py-14 bg-[#030303]" onclick="triggerGallery()">
                        <i class="fas fa-camera text-4xl text-cyan-400 mb-4 opacity-30"></i>
                        <h1 id="upload-status" class="text-lg font-black text-gray-600 uppercase">Upload Chart Screenshot</h1>
                    </div>
                    <input type="file" id="inp-file" accept="image/*" class="hidden" onchange="fileSelected()">
                </div>

                <div id="ui-result" class="hidden flex flex-col items-center text-center w-full">
                    <div id="compounding-box" class="hidden flex flex-col items-center">
                        <div id="res-icon-10s"></div>
                        <h1 id="res-txt-10s" class="text-cyan-400">CALL ↑</h1>
                        <div class="w-20 h-[1px] bg-cyan-900 my-4"></div>
                        <div id="timer-display">10</div>
                        <p class="text-xs text-cyan-500 tracking-widest uppercase">Analyzing Pulse</p>
                    </div>
                    
                    <div id="final-signal-box" class="hidden flex flex-col items-center w-full">
                        <div id="res-icon" class="text-[100px] leading-none mb-2"></div>
                        <h1 id="res-txt" class="text-3xl font-black italic uppercase"></h1>
                        <div id="conf-display" class="text-orange-500 font-bold mt-2 text-xs"></div>
                        <div id="reason-text" class="reason-box"></div>
                        <button id="next-btn" onclick="nextAnalysis()" class="mt-6 text-[12px] text-black bg-[#00ffcc] font-black px-12 py-4 rounded-full uppercase tracking-widest">Next Analysis</button>
                    </div>
                </div>
            </div>
            <button id="btn-execute" onclick="startProcess()" class="hidden action-btn">Run SMC Analysis</button>
        </div>
    </div>

    <div id="market-modal" class="modal-overlay">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-cyan-400 uppercase tracking-widest">Select Market</h2>
            <i class="fas fa-times text-3xl" onclick="closeModal()"></i>
        </div>
        <div id="list-markets">
            <script>
                const mlist = ["USD/INR (OTC)", "USD/BDT (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/BRL (OTC)", "NZD/USD (OTC)", "AUD/USD (OTC)", "USD/MXN (OTC)", "USD/ARS (OTC)", "USD/PKR (OTC)", "USD/TRY (OTC)", "GBP/JPY (OTC)", "CHF/JPY (OTC)", "CAD/JPY (OTC)", "EUR/JPY (OTC)", "GBP/CHF (OTC)", "USD/ZAR (OTC)"];
                mlist.forEach(m => { document.write(`<div class="market-row" onclick="pickMarket('${m}')"><span>${m}</span><i class="fas fa-plus-circle text-cyan-500"></i></div>`); });
            </script>
        </div>
    </div>

    <div id="scan-overlay">
        <div class="radar-box">
            <div class="scanner-line"></div>
            <i class="fas fa-microchip text-4xl text-cyan-400 opacity-20"></i>
        </div>
        <p id="scan-text" class="text-cyan-400 font-bold mt-8 tracking-[5px] animate-pulse uppercase">Extracting Data...</p>
    </div>

    <script>
        function doLogin() {
            if(document.getElementById('uid').value === MASTER_CONFIG.USERNAME && document.getElementById('ukey').value === MASTER_CONFIG.PASSWORD) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('active-market').innerText = "Synced with OTC Server";
            } else alert("INVALID ACCESS!");
        }

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function goHome() {
            toggleMenu(); currentMode = ""; selectedMarket = ""; resetUIs();
            document.getElementById('ui-welcome').classList.remove('hidden');
            document.getElementById('header-title').innerText = "BURAK 亗 JINN";
        }

        function modeSelect(m) {
            currentMode = m;
            toggleMenu(); resetUIs();
            document.getElementById('header-title').innerText = m;
            if(m === 'LIVE ANALYZER') {
                document.getElementById('ui-welcome').classList.add('hidden');
                document.getElementById('ui-analyzer').classList.remove('hidden');
            } else {
                document.getElementById('market-modal').style.display = 'block';
            }
        }

        function pickMarket(m) {
            selectedMarket = m;
            closeModal();
            document.getElementById('ui-welcome').classList.add('hidden');
            document.getElementById('ui-analyzer').classList.add('hidden');
            document.getElementById('active-market').innerText = "Market: " + m;
            document.getElementById('btn-execute').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('market-modal').style.display = 'none'; }
        function triggerGallery() { document.getElementById('inp-file').click(); }
        
        // --- ফাইনাল ফিক্স: লাইভ এনালাইজার আপলোড বাটন ---
        function fileSelected() {
            if(document.getElementById('inp-file').files[0]) {
                document.getElementById('upload-status').innerText = "Chart Ready - Syncing Logic...";
                document.getElementById('upload-status').style.color = "#00ffcc";
                document.getElementById('btn-execute').classList.remove('hidden'); // বাটন এবার উজ্জ্বল হয়ে আসবে
            }
        }

        async function startProcess() {
            document.getElementById('scan-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('scan-overlay').style.display = 'none';
                showResultsUI();
            }, 3000);
        }

        function showResultsUI() {
            resetUIs();
            document.getElementById('ui-result').classList.remove('hidden');
            
            if(currentMode === '10s COMPOUNDING') {
                document.getElementById('compounding-box').classList.remove('hidden');
                start10sProcess();
            } else {
                document.getElementById('final-signal-box').classList.remove('hidden');
                generateFinalSignal();
            }
        }

        // --- ফাইনাল ফিক্স: ১০ সেকেন্ডে বড় সিগন্যাল ও টাইমার ---
        function start10sProcess() {
            let time = 10;
            const isCall = Math.random() > 0.5;
            
            // সিগন্যাল এখন টাইমারের সাথেই এবং বড় দেখাবে (তীর এবং টেক্সট দুইটাই)
            document.getElementById('res-txt-10s').innerText = isCall ? "CALL ↑" : "PUT ↓";
            document.getElementById('res-txt-10s').style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('res-icon-10s').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up text-cyan-400"></i>' : '<i class="fas fa-arrow-circle-down text-red-500"></i>';

            const interval = setInterval(() => {
                time--;
                document.getElementById('timer-display').innerText = time;
                if(time <= 0) {
                    clearInterval(interval);
                    // টাইমার শেষে রিসেট বা নেক্সট বাটন আসবে
                    document.getElementById('final-signal-box').classList.remove('hidden');
                    document.getElementById('res-icon').innerHTML = ""; // সিঙ্গেল সিগন্যাল বক্সেARROW থাকবে না
                    document.getElementById('res-txt').innerText = ""; 
                    document.getElementById('reason-text').innerText = "SMC Logic: FVG filling confirmed. 10s compounding zone established.";
                }
            }, 1000);
        }

        function generateFinalSignal() {
            const isCall = Math.random() > 0.5;
            document.getElementById('res-txt').innerText = isCall ? "CALL ↑" : "PUT ↓";
            document.getElementById('res-txt').style.color = isCall ? "#00ffcc" : "#ff3333";
            document.getElementById('res-icon').innerHTML = isCall ? '<i class="fas fa-arrow-circle-up" style="color:#00ffcc"></i>' : '<i class="fas fa-arrow-circle-down" style="color:#ff3333"></i>';
            document.getElementById('reason-text').innerText = "SMC Logic: MSS confirmed on lower timeframe. Order block rejection.";
        }

        // --- Next Analysis বাটন ক্লিক করলে যা হবে ---
        function nextAnalysis() {
            resetUIs();
            if(currentMode === 'LIVE ANALYZER') {
                document.getElementById('ui-analyzer').classList.remove('hidden');
                document.getElementById('upload-status').innerText = "Upload Chart Screenshot";
                document.getElementById('upload-status').style.color = "";
                document.getElementById('inp-file').value = "";
            } else {
                // Future এবং 10s মোডে সরাসরি Run বাটন দেখাবে, হোম স্ক্রিনে যাবে না
                document.getElementById('active-market').innerText = "Market: " + selectedMarket;
                document.getElementById('ui-welcome').classList.remove('hidden');
                document.getElementById('btn-execute').classList.remove('hidden');
            }
        }

        function resetUIs() {
            const ids = ['ui-welcome', 'ui-analyzer', 'ui-result', 'compounding-box', 'final-signal-box', 'btn-execute'];
            ids.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('timer-display').innerText = "10";
        }
    </script>
</body>
</html>
